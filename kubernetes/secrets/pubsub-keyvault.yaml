apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: pubsub-keyvault # needs to be unique per namespace
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true" # Set to true for using managed identity
    userAssignedIdentityID: f130a494-bf6a-4906-ab25-ff716944a3ff # Setting this to use workload identity ClientID
    keyvaultName: kv-mfolabs-formations # Set to the name of your key vault
    tenantId: 1e2f522c-2662-4a18-938a-8b61a1ab92d1 # The tenant ID of the key vault
    objects: |
      array:
        - |
          objectName: mfouquet-rabbitmq-username
          objectType: secret
        - |
          objectName: mfouquet-rabbitmq-password
          objectType: secret
        - |
          objectName: mfouquet-mssql-sa-password
          objectType: secret
        - |
          objectName: mfouquet-mssql-connectionstring
          objectType: secret
  secretObjects:
    - secretName: mssql-password
      type: Opaque
      data:
        - objectName: mfouquet-mssql-sa-password # name of the mounted content to sync. this could be the object name or object alias
          key: mssql-password
    - secretName: mssql-connectionstring
      type: Opaque
      data:
        - objectName: mfouquet-mssql-connectionstring # name of the mounted content to sync. this could be the object name or object alias
          key: mssql-connectionstring
    - secretName: rabbit-password
      type: Opaque
      data:
        - objectName: mfouquet-rabbitmq-password # name of the mounted content to sync. this could be the object name or object alias
          key: rabbit-password
    - secretName: rabbit-username
      type: Opaque
      data:
        - objectName: mfouquet-rabbitmq-username # name of the mounted content to sync. this could be the object name or object alias
          key: rabbit-username
