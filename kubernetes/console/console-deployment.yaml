apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: console
  name: console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
    spec:
      containers:
        - name: lab-console
          env:
            - name: RabbitMQ__Hostname
              valueFrom:
                configMapKeyRef:
                  key: RabbitMQ__Hostname
                  name: pubsub-cm
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  key: RabbitMQ__Password
                  name: pubsub-secrets
            - name: RabbitMQ__Username
              valueFrom:
                secretKeyRef:
                  key: RabbitMQ__Username
                  name: pubsub-secrets
          image: acrmfolabsform.azurecr.io/matthieuf/pubsub-console:1.0
      restartPolicy: Always
