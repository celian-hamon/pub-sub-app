apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: api
  name: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          env:
            - name: ConnectionStrings__DefaultConnection
              value: Server=tcp:mssql,1433;Initial Catalog=RabbitMqDemo;Persist Security Info=False;User ID=sa;Password=P@ssw0rd2023!;Connection Timeout=30;
            - name: RabbitMQ__Hostname
              value: rabbitmq
            - name: RabbitMQ__Password
              value: admin
            - name: RabbitMQ__Username
              value: admin
          image: acrmfolabsform.azurecr.io/matthieuf/pubsub-api:1.3
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
