apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: api
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  key: ConnectionStrings__DefaultConnection
                  name: pubsub-secrets
            - name: RabbitMQ__Hostname
              valueFrom:
                configMapKeyRef:
                  key: RabbitMQ__Hostname
                  name: pubsub-cm
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  key: RabbitMQ__Password
                  name: pubsub-secrets
            - name: RabbitMQ__Username
              valueFrom:
                secretKeyRef:
                  key: RabbitMQ__Username
                  name: pubsub-secrets
          image: acrmfolabsform.azurecr.io/matthieuf/pubsub-api:1.3
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            limits:
              cpu: 500m
            requests:
              cpu: 200m
      restartPolicy: Always
